{% extends "base.html" %}

{% block title %}Login - Kai's Review Platform{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm bg-white rounded-lg shadow p-6">
    <h1 class="text-lg font-semibold text-gray-900 mb-4">Login</h1>
    {% if error %}
    <div class="bg-red-50 border-l-4 border-red-600 p-3 mb-4">
      <p class="text-sm text-red-700">{{ error }}</p>
    </div>
    {% endif %}
    <form method="POST" action="/login">
      <label for="api_key" class="block text-sm font-medium text-gray-700 mb-1">API Key</label>
      <input type="password" name="api_key" id="api_key" required
             class="w-full border border-gray-300 rounded px-3 py-2 text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-blue-600"
             placeholder="Enter API key">
      <button type="submit"
              class="w-full bg-blue-600 text-white py-2 px-4 rounded text-sm font-medium hover:bg-blue-700">
        Sign In
      </button>
    </form>
  </div>
</div>
{% endblock %}

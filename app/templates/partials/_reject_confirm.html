<!-- Standalone reject confirm overlay (used when detail is not open) -->
<div x-data="{ showReject: false, reason: '' }">
  <!-- This partial is embedded inside _review_detail.html for the inline flow.
       Kept as a separate file for potential reuse or SSE-triggered reject flow. -->
  <div x-show="showReject" x-cloak
       class="fixed inset-0 z-40 flex items-end justify-center bg-black/50">
    <div class="bg-white w-full rounded-t-xl p-6 space-y-4">
      <h3 class="text-lg font-semibold text-gray-900">Reject this review?</h3>
      <p class="text-sm text-gray-500">This action cannot be undone.</p>
      <form hx-post="/reviews/{{ review.id }}/reject"
            hx-target="#review-list"
            hx-swap="innerHTML">
        <textarea name="reason"
                  x-model="reason"
                  placeholder="Enter reason for rejection..."
                  class="w-full h-24 border border-gray-200 rounded-lg p-3 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-blue-600"
                  required></textarea>
        <div class="flex gap-3 mt-4">
          <button type="button"
                  class="h-12 flex-1 border border-gray-200 text-gray-700 font-semibold rounded-lg min-h-[44px]"
                  @click="showReject = false">
            Cancel
          </button>
          <button type="submit"
                  class="h-12 flex-1 bg-red-600 text-white font-semibold rounded-lg min-h-[44px] disabled:opacity-50 disabled:cursor-not-allowed"
                  :disabled="reason.trim().length === 0">
            Reject
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

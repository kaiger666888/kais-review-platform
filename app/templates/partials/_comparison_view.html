<!-- app/templates/partials/_comparison_view.html -->
<template x-if="showComparison">
  <div class="fixed inset-0 bg-black/50 z-40 flex items-center justify-center"
       @click.self="showComparison = false"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0">
    <div class="bg-gray-800 rounded-lg shadow-xl max-w-4xl w-full mx-4 max-h-[80vh] overflow-y-auto"
         @click.stop>
      <div class="p-4">
        <!-- Mode selector -->
        <div class="flex items-center justify-between mb-4">
          <div class="flex gap-2">
            <button @click="comparisonMode = 'first-last'; loadComparisonImages()"
                    :class="comparisonMode === 'first-last' ? 'bg-blue-600 text-white' : 'bg-gray-700 text-gray-300'"
                    class="px-3 py-1 rounded text-xs font-semibold">First vs Last</button>
            <button @click="comparisonMode = 'current-history'; loadComparisonImages()"
                    :class="comparisonMode === 'current-history' ? 'bg-blue-600 text-white' : 'bg-gray-700 text-gray-300'"
                    class="px-3 py-1 rounded text-xs font-semibold">Current vs History</button>
            <button @click="comparisonMode = 'current-reference'; loadComparisonImages()"
                    :class="comparisonMode === 'current-reference' ? 'bg-blue-600 text-white' : 'bg-gray-700 text-gray-300'"
                    class="px-3 py-1 rounded text-xs font-semibold">Current vs Reference</button>
          </div>
          <button @click="showComparison = false" class="text-gray-500 hover:text-gray-300">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>

        <!-- Comparison panels -->
        <div class="grid grid-cols-2 gap-4">
          <!-- Left panel -->
          <div class="space-y-2">
            <div class="text-xs text-gray-400 font-semibold uppercase"
                 x-text="comparisonMode === 'first-last' ? 'First Frame' : comparisonMode === 'current-history' ? 'Current' : 'Current'"></div>
            <div id="comparison-left" class="bg-gray-900 rounded-lg aspect-video flex items-center justify-center">
              <img id="comp-img-left" class="max-w-full max-h-full object-contain" alt="Comparison left" />
            </div>
          </div>

          <!-- Right panel -->
          <div class="space-y-2">
            <div class="text-xs text-gray-400 font-semibold uppercase"
                 x-text="comparisonMode === 'first-last' ? 'Last Frame' : comparisonMode === 'current-history' ? 'Previous Version' : 'Reference'"></div>
            <div id="comparison-right" class="bg-gray-900 rounded-lg aspect-video flex items-center justify-center">
              <img id="comp-img-right" class="max-w-full max-h-full object-contain" alt="Comparison right" />
            </div>
          </div>
        </div>

        <!-- Keyboard hint -->
        <div class="mt-3 text-center text-xs text-gray-500">
          Press <kbd class="bg-gray-700 px-1 rounded">D</kbd> or <kbd class="bg-gray-700 px-1 rounded">Esc</kbd> to close
        </div>
      </div>
    </div>
  </div>
</template>

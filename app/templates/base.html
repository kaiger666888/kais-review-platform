<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Kai's Review Platform{% endblock %}</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/htmx.org@2.0.9"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.12/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 text-sm leading-relaxed"
      x-data="{ toasts: [] }"
      @show-toast.window="toasts.push({ id: Date.now(), message: $event.detail.message, type: $event.detail.type }); setTimeout(() => { const i = toasts.findIndex(t => t.id === $event.detail.id || t.message === $event.detail.message); if (i > -1) toasts.splice(i, 1); }, 3000)"
      x-init="{% if toast_message %}toasts.push({ id: Date.now(), message: '{{ toast_message }}', type: '{{ toast_type }}' }); setTimeout(() => toasts.splice(0, 1), 3000){% endif %}">

  <!-- Toast container -->
  <div class="fixed top-4 left-4 right-4 z-50 space-y-2">
    <template x-for="toast in toasts" :key="toast.id">
      <div class="bg-white border-l-4 rounded shadow-lg p-4"
           :class="toast.type === 'success' ? 'border-green-600' : toast.type === 'error' ? 'border-red-600' : 'border-blue-600'">
        <span x-text="toast.message" class="text-sm"></span>
      </div>
    </template>
  </div>

  <!-- Main content area with bottom padding for tab bar -->
  <main class="pb-16">
    {% block content %}{% endblock %}
  </main>

  <!-- Fixed bottom tab bar -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 h-14 flex items-center justify-around z-40"
       role="tablist" aria-label="Review status tabs">
    <a href="/?tab=pending"
       role="tab"
       aria-selected="{% if active_tab == 'pending' %}true{% else %}false{% endif %}"
       class="flex flex-col items-center justify-center min-h-[44px] min-w-[44px] text-xs font-semibold focus-visible:ring-2 focus-visible:ring-blue-600 {% if active_tab == 'pending' %}text-blue-600{% else %}text-gray-500{% endif %}">
      <!-- Clock icon -->
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
      </svg>
      <span>Pending</span>
    </a>
    <a href="/?tab=approved"
       role="tab"
       aria-selected="{% if active_tab == 'approved' %}true{% else %}false{% endif %}"
       class="flex flex-col items-center justify-center min-h-[44px] min-w-[44px] text-xs font-semibold focus-visible:ring-2 focus-visible:ring-blue-600 {% if active_tab == 'approved' %}text-green-600{% else %}text-gray-500{% endif %}">
      <!-- Check icon -->
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
      </svg>
      <span>Approved</span>
    </a>
    <a href="/?tab=rejected"
       role="tab"
       aria-selected="{% if active_tab == 'rejected' %}true{% else %}false{% endif %}"
       class="flex flex-col items-center justify-center min-h-[44px] min-w-[44px] text-xs font-semibold focus-visible:ring-2 focus-visible:ring-blue-600 {% if active_tab == 'rejected' %}text-red-600{% else %}text-gray-500{% endif %}">
      <!-- X icon -->
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
      </svg>
      <span>Rejected</span>
    </a>
  </nav>
</body>
</html>

name: movie_agent_phases
version: "2.0"
description: "审核路由策略 for kais-movie-agent V4.1 音画融合管线"
rules:
  # 视觉灵魂帧 — 人工审核（3选1 多候选）
  - name: soul_visual_human
    priority: 1
    conditions:
      operator: AND
      checks:
        - field: source_system
          operator: equals
          value: kais-movie-agent
        - field: metadata.phase
          operator: equals
          value: soul-visual
    disposition: HUMAN

  # 声音灵魂 — 人工审核（音色确认）
  - name: soul_voice_human
    priority: 2
    conditions:
      operator: AND
      checks:
        - field: source_system
          operator: equals
          value: kais-movie-agent
        - field: metadata.phase
          operator: equals
          value: soul-voice
    disposition: HUMAN

  # 时空剧本 — 人工审核（AI 评分阈值）
  - name: spatio_temporal_script_human
    priority: 3
    conditions:
      operator: AND
      checks:
        - field: source_system
          operator: equals
          value: kais-movie-agent
        - field: metadata.phase
          operator: equals
          value: spatio-temporal-script
    disposition: HUMAN

  # 种子骨架 — 人工审核（多选）
  - name: seed_skeleton_human
    priority: 4
    conditions:
      operator: AND
      checks:
        - field: source_system
          operator: equals
          value: kais-movie-agent
        - field: metadata.phase
          operator: equals
          value: seed-skeleton
    disposition: HUMAN

  # 动态运镜预览 — 人工审核
  - name: motion_preview_human
    priority: 5
    conditions:
      operator: AND
      checks:
        - field: source_system
          operator: equals
          value: kais-movie-agent
        - field: metadata.phase
          operator: equals
          value: motion-preview
    disposition: HUMAN

  # AI风格化预览 — 人工审核
  - name: ai_preview_human
    priority: 6
    conditions:
      operator: AND
      checks:
        - field: source_system
          operator: equals
          value: kais-movie-agent
        - field: metadata.phase
          operator: equals
          value: ai-preview
    disposition: HUMAN

  # 终版生产 — 人工审核
  - name: final_production_human
    priority: 7
    conditions:
      operator: AND
      checks:
        - field: source_system
          operator: equals
          value: kais-movie-agent
        - field: metadata.phase
          operator: equals
          value: final-production
    disposition: HUMAN

  # 合成与质检 — 自动通过（内部 AI 评估）
  - name: composition_auto
    priority: 10
    conditions:
      operator: AND
      checks:
        - field: source_system
          operator: equals
          value: kais-movie-agent
        - field: metadata.phase
          operator: equals
          value: composition
    disposition: AUTO
